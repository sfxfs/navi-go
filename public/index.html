<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NaviGo Planner</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>NaviGo Travel Planner</h1>
        <p>Describe your trip in natural language, and the AI will ask for missing details.</p>
        <p><a href="/form.html">→ Switch to form mode</a></p>
      </header>

      <section class="card chat-card">
        <div class="chat-header">
          <label class="thread-label">
            Thread ID
            <input id="threadId" type="text" value="chat-demo-1" placeholder="trip-2026-rome" />
          </label>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <div class="chat-input-area">
          <textarea id="chat-input" rows="2" placeholder="Describe your trip... e.g. I want to visit Tokyo for 5 days with a budget of 2500 USD"></textarea>
          <button id="chat-send" type="button">Send</button>
        </div>
      </section>

      <section id="result-card" class="card hidden">
        <h2>Travel Plan</h2>
        <div id="result-content"></div>
      </section>
    </main>
  </body>
</html>
